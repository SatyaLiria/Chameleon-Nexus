{% extends "admin/layout.html" %}

{% block content %}
<h2><i class="bi bi-person-plus"></i> Add Student</h2>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="card-box">
    <form method="POST" action="{{ url_for('add_student') }}">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Roll Number <span class="text-danger">*</span></label>
                <input type="text" name="roll_number" class="form-control" placeholder="Enter roll number" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Student Name <span class="text-danger">*</span></label>
                <input type="text" name="student_name" class="form-control" placeholder="Enter student name" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Program</label>
                <input type="text" name="program" class="form-control" placeholder="Enter program">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Major</label>
                <input type="text" name="major" class="form-control" placeholder="Enter major">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Mobile Number</label>
                <input type="text" name="mobile_number" class="form-control" placeholder="Enter mobile number">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email">
            </div>
            <div class="col-md-12 mb-3">
                <label class="form-label fw-bold">Address</label>
                <textarea name="address" class="form-control" rows="2" placeholder="Enter address"></textarea>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Fee Status</label>
                <select name="fee_status" class="form-select">
                    <option value="">Select Fee Status</option>
                    <option value="Paid">Paid</option>
                    <option value="Pending">Pending</option>
                    <option value="Partial">Partial</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Pending Amount</label>
                <input type="number" name="pending_amount" class="form-control" placeholder="Enter pending amount" step="0.01">
            </div>
        </div>
        <div class="text-end">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-plus-circle"></i> Add Student
            </button>
        </div>
    </form>
</div>
{% endblock %}
